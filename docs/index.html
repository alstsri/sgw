<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SGW Hunt</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>SGW Hunt</h1>
    <div class="tabs" id="tabs"></div>
    <div class="filters" id="filters">
      <button data-rec="all" class="active">All</button>
      <button data-rec="Buy">Buy</button>
      <button data-rec="Watch">Watch</button>
      <button data-rec="Need measurements">Measure</button>
    </div>
    <div class="filters types" id="types"></div>
    <div class="meta" id="meta"></div>
  </header>
  <main id="grid"></main>
  <footer id="footer"></footer>
  <script src="app.js"></script>
</body>
</html>
